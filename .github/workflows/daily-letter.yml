name: Daily Letter to Komiro

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  write-letter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run
        run: npm install && node scripts/write-letter.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OMBRE_API_URL: ${{ secrets.OMBRE_API_URL }}
