name: Daily Letter to Komiro

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: Komiro-letters

jobs:
  write-letter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Write letter
        run: node scripts/write-letter.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OMBRE_API_URL: ${{ secrets.OMBRE_API_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
