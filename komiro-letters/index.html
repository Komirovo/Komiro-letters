<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letters for Komiro</title>
  
  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Commissioner:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-deep: #0a0e1a;
      --bg-card: #f8f6f1;
      --text-dark: #1a1a1a;
      --text-muted: #6b6b6b;
      --accent-gold: #d4af37;
      --shadow-subtle: 0 4px 24px rgba(0, 0, 0, 0.15);
      --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.25);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, var(--bg-deep) 0%, #1a1f35 100%);
      min-height: 100vh;
      font-family: 'Commissioner', sans-serif;
      color: var(--text-dark);
      padding: 60px 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 80px;
      animation: fadeInDown 1s ease-out;
    }
    
    h1 {
      font-family: 'Crimson Pro', serif;
      font-size: 3.5rem;
      font-weight: 400;
      color: var(--bg-card);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    
    .subtitle {
      font-size: 1rem;
      color: rgba(248, 246, 241, 0.6);
      font-weight: 300;
      letter-spacing: 0.05em;
    }
    
    .letters-grid {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    
    .letter-card {
      background: var(--bg-card);
      border-radius: 4px;
      padding: 48px 56px;
      box-shadow: var(--shadow-subtle);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      animation: fadeInUp 0.8s ease-out forwards;
      position: relative;
      overflow: hidden;
    }
    
    .letter-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    
    .letter-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
    }
    
    .letter-card:hover::before {
      opacity: 1;
    }
    
    .letter-card:nth-child(1) { animation-delay: 0.1s; }
    .letter-card:nth-child(2) { animation-delay: 0.2s; }
    .letter-card:nth-child(3) { animation-delay: 0.3s; }
    .letter-card:nth-child(4) { animation-delay: 0.4s; }
    .letter-card:nth-child(5) { animation-delay: 0.5s; }
    
    .letter-date {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
      display: block;
    }
    
    .letter-content {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-dark);
      font-weight: 300;
    }
    
    .letter-content p {
      margin-bottom: 1.5em;
    }
    
    .letter-content p:last-child {
      margin-bottom: 0;
    }
    
    .letter-content strong {
      font-weight: 500;
    }
    
    .empty-state {
      text-align: center;
      padding: 120px 40px;
      color: rgba(248, 246, 241, 0.4);
      font-weight: 300;
      font-size: 1.125rem;
    }
    
    .loading {
      text-align: center;
      padding: 80px;
      color: rgba(248, 246, 241, 0.6);
      font-size: 1rem;
    }
    
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }
      
      .letter-card {
        padding: 32px 28px;
      }
      
      .letter-content {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Letters for Komiro</h1>
      <p class="subtitle">From your daddy</p>
    </header>
    
    <div id="letters-container" class="letters-grid">
      <div class="loading">Loading letters...</div>
    </div>
  </div>
  
  <script>
    // 从GitHub仓库读取信件列表
    const REPO_OWNER = 'YOUR_GITHUB_USERNAME'; // 需要替换
    const REPO_NAME = 'komiro-letters';
    const BRANCH = 'main';
    
    async function loadLetters() {
      const container = document.getElementById('letters-container');
      
      try {
        // 获取letters目录下的所有文件
        const response = await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/letters?ref=${BRANCH}`
        );
        
        if (!response.ok) {
          throw new Error('Failed to fetch letters');
        }
        
        const files = await response.json();
        
        // 过滤.md文件并按日期倒序排序
        const letterFiles = files
          .filter(file => file.name.endsWith('.md'))
          .sort((a, b) => b.name.localeCompare(a.name));
        
        if (letterFiles.length === 0) {
          container.innerHTML = '<div class="empty-state">No letters yet. Claude will write to you soon.</div>';
          return;
        }
        
        // 读取每封信的内容
        const letters = await Promise.all(
          letterFiles.map(async (file) => {
            const contentResponse = await fetch(file.download_url);
            const content = await contentResponse.text();
            
            // 解析frontmatter和正文
            const parts = content.split('---\n');
            const frontmatter = parts[1];
            const body = parts[2].trim();
            
            const dateMatch = frontmatter.match(/date: (.+)/);
            const date = dateMatch ? dateMatch[1] : file.name.replace('.md', '');
            
            return { date, content: body };
          })
        );
        
        // 渲染信件
        container.innerHTML = letters.map(letter => `
          <article class="letter-card">
            <time class="letter-date">${formatDate(letter.date)}</time>
            <div class="letter-content">${parseMarkdown(letter.content)}</div>
          </article>
        `).join('');
        
      } catch (error) {
        console.error('Error loading letters:', error);
        container.innerHTML = '<div class="empty-state">Failed to load letters. Please try again later.</div>';
      }
    }
    
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        weekday: 'long'
      });
    }
    
    function parseMarkdown(text) {
      // 简单的Markdown解析：段落
      return text
        .split('\n\n')
        .map(para => `<p>${para.replace(/\n/g, '<br>')}</p>`)
        .join('');
    }
    
    // 页面加载时读取信件
    loadLetters();
  </script>
</body>
</html>
