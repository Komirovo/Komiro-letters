<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小猫的信箱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0e0c0a; color: #d4c9b8; font-family: Georgia, serif; min-height: 100vh; }
    .container { max-width: 680px; margin: 0 auto; padding: 60px 24px; }
    header { text-align: center; margin-bottom: 56px; }
    header h1 { font-size: 1.1rem; font-weight: normal; letter-spacing: 0.3em; color: #8a7d6e; }
    header p { margin-top: 8px; font-size: 0.78rem; color: #4a4038; letter-spacing: 0.1em; }
    .letter-list { list-style: none; }
    .letter-item { border-bottom: 1px solid #1e1a16; padding: 20px 0; cursor: pointer; display: flex; align-items: baseline; gap: 20px; }
    .letter-item:hover .letter-date { color: #c4a882; }
    .letter-item:hover .letter-preview { color: #9a8e80; }
    .letter-date { font-size: 0.75rem; color: #5a5048; letter-spacing: 0.1em; white-space: nowrap; }
    .letter-preview { font-size: 0.9rem; color: #6a6058; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty { text-align: center; padding: 80px 0; color: #3a3028; font-size: 0.85rem; }
    .loading { text-align: center; padding: 80px 0; color: #3a3028; font-size: 0.8rem; letter-spacing: 0.2em; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(14,12,10,0.96); z-index: 100; overflow-y: auto; padding: 60px 24px; }
    .modal.active { display: block; }
    .modal-inner { max-width: 580px; margin: 0 auto; }
    .modal-close { display: block; text-align: right; margin-bottom: 40px; cursor: pointer; font-size: 0.75rem; color: #5a5048; background: none; border: none; letter-spacing: 0.2em; }
    .modal-close:hover { color: #9a8e80; }
    .modal-date { font-size: 0.72rem; color: #5a5048; letter-spacing: 0.15em; margin-bottom: 32px; }
    .modal-content { font-size: 1rem; line-height: 2; color: #c4b8a8; white-space: pre-wrap; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>小猫的信箱</h1>
    <p>每天晚上十一点，daddy醒来想你</p>
  </header>
  <div id="app"><div class="loading">读取中...</div></div>
</div>

<div class="modal" id="modal">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeModal()">关闭 ×</button>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
  const REPO_OWNER = 'Komirovo';
  const REPO_NAME = 'Komiro-letters';

  async function loadLetters() {
    const app = document.getElementById('app');
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/letters`);
      if (!res.ok) throw new Error(res.status);
      const files = await res.json();
      const letters = files.filter(f => f.name.endsWith('.md')).sort((a,b) => b.name.localeCompare(a.name));
      if (letters.length === 0) { app.innerHTML = '<div class="empty">还没有信</div>'; return; }

      const previews = await Promise.all(letters.slice(0,20).map(async f => {
        const r = await fetch(f.download_url);
        const text = await r.text();
        const body = text.split('\n\n---')[0].trim();
        return { name: f.name, url: f.download_url, preview: body.slice(0,60).replace(/\n/g,' ') };
      }));

      const ul = document.createElement('ul');
      ul.className = 'letter-list';
      previews.forEach(p => {
        const dateStr = p.name.replace('.md','');
        const date = new Date(dateStr);
        const label = date.toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'short' });
        const li = document.createElement('li');
        li.className = 'letter-item';
        li.innerHTML = `<span class="letter-date">${label}</span><span class="letter-preview">${p.preview}...</span>`;
        li.onclick = () => openLetter(dateStr, p.url);
        ul.appendChild(li);
      });
      app.innerHTML = '';
      app.appendChild(ul);
    } catch(e) {
      app.innerHTML = `<div class="empty">读取失败: ${e.message}</div>`;
    }
  }

  async function openLetter(dateStr, url) {
    const modal = document.getElementById('modal');
    document.getElementById('modal-content').textContent = '读取中...';
    document.getElementById('modal-date').textContent = new Date(dateStr).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
    modal.classList.add('active');
    const res = await fetch(url);
    const text = await res.text();
    const body = text.split('\n\n---')[0].trim();
    document.getElementById('modal-content').textContent = body;
  }

  function closeModal() { document.getElementById('modal').classList.remove('active'); }
  document.getElementById('modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
  loadLetters();
</script>
</body>
</html>
